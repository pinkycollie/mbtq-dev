name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  install-build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 8

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install Dependencies
      run: pnpm install
      env:
        CI: true

    - name: Run Linter (ESLint)
      run: pnpm run lint

    - name: Type Checking (TSC)
      run: pnpm run build

    - name: Run Tests (Jest/Mocha)
      run: pnpm test