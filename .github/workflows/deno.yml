name: Deno-Led Automation (Manual Trigger Only)

on:
  workflow_dispatch:

jobs:
  run-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Run Unified Tasks
        run: |
          deno task lint
          deno task test
