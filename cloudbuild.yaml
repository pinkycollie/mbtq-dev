steps:
  # 1. Run Full MBTQ Pipeline via Deno
  - name: 'denoland/deno:latest'
    entrypoint: 'deno'
    args: ['task', 'pipeline:full']

  # 2. Build Docker Image (only if pipeline passes)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/mbtq-factory-hub:$COMMIT_SHA', '.']

  # 3. Push Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mbtq-factory-hub:$COMMIT_SHA']

  # 4. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mbtq-foundry'
      - '--image'
      - 'gcr.io/$PROJECT_ID/mbtq-factory-hub:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/mbtq-factory-hub:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
