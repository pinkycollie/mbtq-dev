steps:
  # Build Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/mbtq-factory-hub:$COMMIT_SHA', '.']

  # Push Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mbtq-factory-hub:$COMMIT_SHA']

  # Deploy to Cloud Run (Engineering Foundry)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mbtq-foundry'
      - '--image'
      - 'gcr.io/$PROJECT_ID/mbtq-factory-hub:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/mbtq-factory-hub:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
